<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영웅문 연동 복기 대시보드 V2.0</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- TOP HEADER AREA -->
        <header class="app-header">
            <div class="header-left">
                <h1>Tactical Trading Board <span class="version">v2.0</span></h1>
            </div>
            <div class="header-middle">
                <div class="stock-badge">
                    <span class="pulse-icon"></span>
                    <span id="active-stock-name">연동 대기 중...</span>
                </div>
            </div>
            <div class="header-right" style="display: flex; align-items: center; gap: 10px;">
                <label class="toggle-switch">
                    <input type="checkbox" id="hts-link-toggle" checked>
                    <span class="slider round"></span>
                </label>
                <div class="status-indicator" id="connection-status">
                    <span class="status-dot"></span>
                    <span class="status-text" id="hts-link-status">HTS 연동 ON</span>
                </div>
            </div>
        </header>

        <!-- MAIN BODY CONTAINING SIDEBAR AND GRID -->
        <div class="app-body">
            <!-- SIDEBAR: STOCK LIST -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h3>종목 검색 & 목록</h3>
                    <div class="search-container">
                        <input type="text" id="stock-search" placeholder="종목명 검색..." autocomplete="off">
                    </div>
                    <div class="filter-tabs">
                        <button class="filter-tab active" data-filter="all">전체</button>
                        <button class="filter-tab" data-filter="active">진행중</button>
                        <button class="filter-tab" data-filter="settled">결산</button>
                    </div>
                </div>
                <div class="stock-list-wrapper" id="stock-list-container">
                    <!-- Stock items will render here dynamically -->
                </div>
            </aside>

            <!-- MAIN DASHBOARD CONTENT -->
            <main class="dashboard-grid">
            
            <!-- LEFT PANEL: MARTIN CALCULATOR & METADATA -->
            <section class="panel-left">
                <!-- METADATA & TREND STATUS -->
                <div class="card metadata-card">
                    <div class="card-header">
                        <h2>차트 분석 메타데이터</h2>
                    </div>
                    <div class="card-body">
                        <!-- Trend Status Selection -->
                        <div class="form-group">
                            <label class="section-label">추세 상태 (Trend Status)</label>
                            <div class="trend-selector">
                                <label class="trend-option option-down">
                                    <input type="radio" name="trend_status" value="하락 추세 진행중">
                                    <span class="option-label">하락 추세 진행중</span>
                                </label>
                                <label class="trend-option option-pullback">
                                    <input type="radio" name="trend_status" value="눌림목 지지중">
                                    <span class="option-label">눌림목 지지중</span>
                                </label>
                                <label class="trend-option option-range">
                                    <input type="radio" name="trend_status" value="수렴 및 박스권">
                                    <span class="option-label">수렴 및 박스권</span>
                                </label>
                                <label class="trend-option option-breakout">
                                    <input type="radio" name="trend_status" value="추세 상단 돌파">
                                    <span class="option-label">추세 상단 돌파</span>
                                </label>
                            </div>
                        </div>

                        <!-- Notion-style Dynamic Tags -->
                        <div class="form-group">
                            <label class="section-label">동적 키워드 태그 (Dynamic Tags)</label>
                            <div class="tags-container-wrapper">
                                <div id="tags-badge-list" class="tags-badge-list">
                                    <!-- Badges will be rendered dynamically here -->
                                </div>
                                <input type="text" id="tag-input" placeholder="태그 입력 후 Enter (예: 자사주10%)">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 1-1-2-4 MARTIN CALCULATOR -->
                <div class="card calculator-card">
                    <div class="card-header">
                        <h2>1-1-2-4 마틴 분할매수 계산기</h2>
                    </div>
                    <div class="card-body">
                        <!-- Base Inputs -->
                        <div class="inputs-row">
                            <div class="form-group flex-1">
                                <label for="base-price">1차 진입 단가 (₩)</label>
                                <input type="number" id="base-price" placeholder="금액 입력" min="0">
                            </div>
                            <div class="form-group flex-1">
                                <label for="base-qty">1차 진입 수량 (또는 금액)</label>
                                <input type="number" id="base-qty" value="1" min="1">
                            </div>
                        </div>

                        <!-- Martin Ratios Table -->
                        <div class="table-container">
                            <table class="martin-table">
                                <thead>
                                    <tr>
                                        <th>차수</th>
                                        <th>계획 비중</th>
                                        <th>실제 수량</th>
                                        <th>단가</th>
                                        <th>매수 집행 트리거</th>
                                        <th>매수일</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="martin-table-body">
                                    <!-- Rendered dynamically via app.js -->
                                </tbody>
                            </table>
                            <button type="button" id="btn-add-tier" class="btn btn-secondary" style="margin-top: 10px; width: 100%; border: 1px dashed var(--primary); background: rgba(0, 191, 165, 0.05); color: var(--primary); font-weight: 600; padding: 10px; border-radius: 4px; cursor: pointer; transition: all 0.2s ease;">+ 분할매수 차수 추가</button>
                        </div>

                        <!-- Real-time Average Price Summary -->
                        <div class="avg-price-summary" style="display: flex; flex-direction: column; gap: 12px; margin-top: 15px; padding: 12px; background: rgba(0, 191, 165, 0.05); border: 1px solid rgba(0, 191, 165, 0.2); border-radius: 6px;">
                            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
                                <div style="display: flex; flex-direction: column; gap: 4px; text-align: center; border-right: 1px solid rgba(0, 191, 165, 0.15);">
                                    <span class="label" style="font-size: 0.72rem; color: var(--color-text-muted); margin-bottom: 0;">총 매수수량</span>
                                    <span class="value" id="total-qty-val" style="font-size: 0.95rem; font-weight: 600; color: #FFF;">0 주</span>
                                </div>
                                <div style="display: flex; flex-direction: column; gap: 4px; text-align: center; border-right: 1px solid rgba(0, 191, 165, 0.15);">
                                    <span class="label" style="font-size: 0.72rem; color: var(--color-text-muted); margin-bottom: 0;">총 매수금액</span>
                                    <span class="value" id="total-amount-val" style="font-size: 0.95rem; font-weight: 600; color: #FFF;">₩ 0</span>
                                </div>
                                <div style="display: flex; flex-direction: column; gap: 4px; text-align: center;">
                                    <span class="label" style="font-size: 0.72rem; color: var(--color-text-muted); margin-bottom: 0;">평균 매수단가</span>
                                    <span class="value" id="current-avg-price" style="font-size: 0.95rem; font-weight: 600; color: var(--primary);">₩ 0</span>
                                </div>
                            </div>
                            <div style="border-top: 1px solid rgba(0, 191, 165, 0.15); padding-top: 10px; display: flex; align-items: center; justify-content: space-between;">
                                <span class="label" style="font-size: 0.75rem; color: var(--color-text-muted); margin-bottom: 0; font-weight: 600;">다음 진입 필요 비중</span>
                                <span id="next-buy-plan" style="font-size: 0.82rem; font-weight: 700; color: #64B5F6;">대기 중</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- RIGHT PANEL: TARGET PRICES & SETTLEMENT -->
            <section class="panel-right">
                <!-- TARGETS CARD -->
                <div class="card targets-card">
                    <div class="card-header">
                        <h2>목표가 및 손절가 설정</h2>
                    </div>
                    <div class="card-body">
                        <div class="inputs-row">
                            <div class="form-group flex-1">
                                <label for="target-price" class="target-label">🎯 목표가 (Target Price)</label>
                                <input type="number" id="target-price" placeholder="목표가 입력" min="0">
                            </div>
                            <div class="form-group flex-1">
                                <label for="stop-price" class="stop-label">⚠️ 손절가 (Stop Loss)</label>
                                <input type="number" id="stop-price" placeholder="손절가 입력" min="0">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- SETTLEMENT CARD -->
                <div class="card settlement-card">
                    <div class="card-header">
                        <h2>매매 자동 결산 시스템</h2>
                    </div>
                    <div class="card-body">
                        <div class="settlement-row" style="display: flex; gap: 12px; align-items: flex-end;">
                            <div class="form-group" style="flex: 1.2; margin-bottom: 0;">
                                <label for="sell-price">최종 매도 단가 (₩)</label>
                                <input type="number" id="sell-price" placeholder="단가 입력" min="0" style="width: 100%; box-sizing: border-box;">
                            </div>
                            <div class="form-group" style="flex: 1.5; margin-bottom: 0;">
                                <label for="sell-date">최종 매도일</label>
                                <input type="date" id="sell-date" style="width: 100%; box-sizing: border-box; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--color-text-primary); padding: 9px 12px; border-radius: 4px; outline: none; font-family: inherit;">
                            </div>
                            <button class="btn btn-settle" id="btn-settle-execute" style="flex: 1; height: 40px; padding: 0;">최종 청산</button>
                        </div>

                        <!-- Result Display Panel -->
                        <div class="settlement-results" id="settlement-results-box" style="display: none;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                                <h3 style="margin-bottom: 0;">결산 완료</h3>
                                <button type="button" id="btn-settle-edit" style="background: rgba(0, 191, 165, 0.1); border: 1px solid rgba(0, 191, 165, 0.3); color: var(--primary); padding: 4px 12px; border-radius: 4px; font-size: 0.72rem; cursor: pointer; transition: all 0.2s;">수정</button>
                            </div>
                            <div class="results-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">
                                <div class="result-item" style="align-items: center;">
                                    <span class="res-lbl">매수 정보 (일자/평단)</span>
                                    <input type="text" id="res-buy-info" readonly style="background: transparent; border: none; color: #FFF; font-size: 0.95rem; font-weight: 700; text-align: center; width: 100%; outline: none; font-family: inherit; padding: 2px 0;">
                                </div>
                                <div class="result-item" style="align-items: center;">
                                    <span class="res-lbl">매도 정보 (일자/단가)</span>
                                    <input type="text" id="res-sell-info" readonly style="background: transparent; border: none; color: #FFF; font-size: 0.95rem; font-weight: 700; text-align: center; width: 100%; outline: none; font-family: inherit; padding: 2px 0;">
                                </div>
                                <div class="result-item" style="align-items: center;">
                                    <span class="res-lbl">보유 기간</span>
                                    <input type="text" id="res-holding-period" readonly style="background: transparent; border: none; color: #FFF; font-size: 1.15rem; font-weight: 700; text-align: center; width: 100%; outline: none; font-family: inherit; padding: 2px 0; transition: border-bottom 0.2s;">
                                </div>
                                <div class="result-item" style="align-items: center;">
                                    <span class="res-lbl">최종 수익률</span>
                                    <input type="text" id="res-yield-rate" readonly style="background: transparent; border: none; color: var(--green); font-size: 1.15rem; font-weight: 700; text-align: center; width: 100%; outline: none; font-family: inherit; padding: 2px 0; transition: border-bottom 0.2s;">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- DAILY LOG TIMELINE CARD -->
                <div class="card timeline-card">
                    <div class="card-header">
                        <h2>타임라인형 메모 기록 (Daily Log)</h2>
                    </div>
                    <div class="card-body">
                        <!-- Comment Input -->
                        <div class="comment-input-row">
                            <textarea id="comment-text" placeholder="실시간 차트 분석 및 감정을 기록하세요 (Enter로 전송 가능)"></textarea>
                            <button class="btn btn-primary" id="btn-add-comment">추가</button>
                        </div>

                        <!-- Timeline Display -->
                        <div class="timeline-container" id="timeline-container">
                            <!-- Logs will be loaded here dynamically -->
                        </div>
                    </div>
                </div>
            </section>
        </main>
        </div> <!-- Closing app-body -->
    </div> <!-- Closing app-container -->

    <!-- Script Import -->
    <script src="app.js?v=20260705"></script>
</body>
</html>
